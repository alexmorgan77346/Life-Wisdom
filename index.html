<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Life Wisdom</title>
  <meta name="description" content="Deep life lessons and philosophy for a conscious, joyful life." />
  <meta name="theme-color" content="#2c5f4a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Life Wisdom" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">

  <!-- ═══ HOME VIEW ═══════════════════════════════════════ -->
  <div id="home-view">

    <!-- Top bar: search + theme -->
    <div class="topbar">
      <div class="topbar-brand">
        <span class="topbar-logo">🌿</span>
        <span class="topbar-title">Life Wisdom</span>
      </div>
      <div class="topbar-actions">
        <button class="topbar-btn" id="search-toggle" aria-label="Search" aria-expanded="false">
          <svg width="17" height="17" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="topbar-btn" id="theme-toggle" aria-label="Change theme" title="Change theme">
          <svg width="17" height="17" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.5"/>
            <path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.05 3.05l1.06 1.06M11.9 11.9l1.05 1.05M3.05 12.95l1.06-1.06M11.9 4.1l1.05-1.05"
                  stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Theme picker panel -->
    <div class="theme-panel" id="theme-panel" aria-hidden="true">
      <p class="theme-panel-label">Choose Theme</p>
      <div class="theme-swatches">
        <button class="swatch active" data-theme="forest" title="Forest Green">
          <span style="background:#2c5f4a"></span>Forest
        </button>
        <button class="swatch" data-theme="ocean" title="Ocean Blue">
          <span style="background:#1a5276"></span>Ocean
        </button>
        <button class="swatch" data-theme="rose" title="Rose Blush">
          <span style="background:#8e3a4a"></span>Rose
        </button>
        <button class="swatch" data-theme="sand" title="Warm Sand">
          <span style="background:#8b6914"></span>Sand
        </button>
        <button class="swatch" data-theme="dark" title="Dark Mode">
          <span style="background:#1a1a2e"></span>Dark
        </button>
      </div>
    </div>

    <!-- Search panel -->
    <div class="search-panel" id="search-panel" aria-hidden="true">
      <div class="search-wrap">
        <svg class="search-icon" width="15" height="15" viewBox="0 0 16 16" fill="none"
             xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input type="search" id="search-input"
               placeholder="Search lessons… ego, peace, bliss"
               autocomplete="off" aria-label="Search lessons" />
        <button class="search-clear" id="search-clear" aria-label="Clear">✕</button>
      </div>
    </div>

    <!-- Category filter scroll bar -->
    <div class="filter-bar-wrap">
      <div class="filter-bar" id="filter-bar" role="tablist" aria-label="Filter by category">
        <button class="filter-chip active" data-cat="all" role="tab" aria-selected="true">All</button>
        <button class="filter-chip" data-cat="happiness" role="tab">☀️ Happiness</button>
        <button class="filter-chip" data-cat="emotions" role="tab">🌧️ Emotions</button>
        <button class="filter-chip" data-cat="bliss" role="tab">✨ Bliss</button>
        <button class="filter-chip" data-cat="consciousness" role="tab">🌿 Consciousness</button>
        <button class="filter-chip" data-cat="relationships" role="tab">🪷 Relationships</button>
        <button class="filter-chip" data-cat="mind" role="tab">🧠 Mind</button>
        <button class="filter-chip" data-cat="peace" role="tab">🌊 Peace</button>
        <button class="filter-chip" data-cat="meditation" role="tab">🕯️ Meditation</button>
        <button class="filter-chip" data-cat="living" role="tab">🌸 Living</button>
        <button class="filter-chip" data-cat="custom" role="tab">✏️ My Lessons</button>
      </div>
    </div>

    <!-- Header -->
    <header>
      <div class="header-ornament">
        <div class="ornament-line"></div>
        <div class="ornament-dot"></div>
        <div class="ornament-line right"></div>
      </div>
      <h1 class="app-title">Life <span>Wisdom</span></h1>
      <p class="app-tagline">Lessons for a conscious life</p>
    </header>

    <!-- Section label -->
    <p class="section-label" id="section-label">All Lessons</p>

    <!-- Lesson cards -->
    <div class="cards-grid" id="cards-grid" role="list"></div>

    <!-- No results -->
    <div class="no-results" id="no-results" aria-live="polite">
      <div class="no-results-icon">🔍</div>
      <p>No lessons match your search.</p>
    </div>

    <!-- Add Lesson button -->
    <button class="add-lesson-fab" id="add-lesson-btn" aria-label="Add new lesson">
      <svg width="22" height="22" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round"/>
      </svg>
    </button>

  </div><!-- /#home-view -->

  <!-- ═══ ADD LESSON MODAL ══════════════════════════════════ -->
  <div class="modal-overlay" id="modal-overlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <h2 class="modal-title" id="modal-title">Add Your Lesson</h2>
        <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <label class="field-label" for="f-title">Title *</label>
        <input class="field-input" id="f-title" type="text" placeholder="e.g. The Power of Silence" />

        <label class="field-label" for="f-emoji">Emoji</label>
        <input class="field-input" id="f-emoji" type="text" placeholder="🌟" maxlength="2" />

        <label class="field-label" for="f-explanation">The Teaching *</label>
        <textarea class="field-input" id="f-explanation" rows="3"
                  placeholder="What is the core teaching of this lesson?"></textarea>

        <label class="field-label" for="f-advice">Practical Advice *</label>
        <textarea class="field-input" id="f-advice" rows="3"
                  placeholder="What should one do with this lesson?"></textarea>

        <label class="field-label" for="f-insight">Key Insight</label>
        <textarea class="field-input" id="f-insight" rows="2"
                  placeholder="The deepest truth in one or two sentences."></textarea>

        <label class="field-label" for="f-tags">Tags (comma separated)</label>
        <input class="field-input" id="f-tags" type="text" placeholder="mind, peace, awareness" />

        <p class="field-error" id="field-error"></p>
      </div>
      <div class="modal-footer">
        <button class="modal-cancel" id="modal-cancel">Cancel</button>
        <button class="modal-save" id="modal-save">Save Lesson</button>
      </div>
    </div>
  </div>

  <!-- ═══ LESSON DETAIL VIEW ═══════════════════════════════ -->
  <div id="lesson-view" style="display:none" aria-label="Lesson detail">

    <div class="detail-topbar">
      <button class="detail-back" id="back-btn" aria-label="Back to lessons">
        <svg width="18" height="18" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.6"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>All Lessons</span>
      </button>
    </div>

    <div class="lesson-hero">
      <div class="lesson-hero-emoji" id="detail-emoji" aria-hidden="true"></div>
      <h1 class="lesson-hero-title" id="detail-title"></h1>
      <span class="lesson-category" id="detail-category"></span>
    </div>

    <!-- Teaching -->
    <section class="lesson-section">
      <p class="lesson-section-label">
        <span class="lesson-section-dot" aria-hidden="true"></span>The Teaching
      </p>
      <p id="detail-explanation"></p>
    </section>

    <!-- Practical Advice (now second) -->
    <section class="lesson-section advice">
      <p class="lesson-section-label">
        <span class="lesson-section-dot" aria-hidden="true"></span>Practical Advice
      </p>
      <p id="detail-advice"></p>
    </section>

    <!-- Key Insight (now third) -->
    <section class="lesson-section insight">
      <p class="lesson-section-label">
        <span class="lesson-section-dot" aria-hidden="true"></span>Key Insight
      </p>
      <p id="detail-insight"></p>
    </section>

    <div class="lesson-tags" id="detail-tags"></div>

    <div class="detail-actions">
      <button class="detail-btn highlight-btn" id="highlight-btn" aria-pressed="false">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 13h12M8.5 2.5l3.5 3.5-5 5H4V8l4.5-5.5z" stroke="currentColor"
                stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Highlight
      </button>
      <button class="detail-btn pdf-btn" id="pdf-btn">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 2h7l3 3v9a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1z" stroke="currentColor"
                stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M10 2v4h4M8 7v5M5.5 9.5L8 12l2.5-2.5" stroke="currentColor"
                stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Download PDF
      </button>
      <button class="detail-btn delete-btn" id="detail-delete-btn">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 4h12M5 4V3a1 1 0 011-1h4a1 1 0 011 1v1M6 7v5M10 7v5M3 4l1 9a1 1 0 001 1h6a1 1 0 001-1l1-9"
                stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Delete
      </button>
    </div>

  </div><!-- /#lesson-view -->

</div><!-- /#app -->

<!-- Bottom Bar -->
<nav class="bottom-bar" aria-label="App info">
  <div class="bottom-bar-inner">
    <div class="bottom-stat">
      <strong id="lesson-count">—</strong>
      on life &amp; consciousness
    </div>
    <button class="install-btn" id="install-btn" aria-label="Install app">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M7 1v8M4 6l3 3 3-3M2 10v2a1 1 0 001 1h8a1 1 0 001-1v-2"
              stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Install App
    </button>
  </div>
</nav>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="app.js"></script>
</body>
</html>
